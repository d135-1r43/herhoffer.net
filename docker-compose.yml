version: '3.8'

services:
  web:
    image: ghcr.io/d135-1r43/herhoffer.net:latest
    container_name: herhoffer-net
    restart: unless-stopped

    networks:
      - nginx-proxy-manager

    # Optional: expose port if needed for direct access
    # ports:
    #   - "8030:80"

    labels:
      # Portainer labels
      - "io.portainer.accesscontrol.public=false"

      # Optional: Traefik labels (if using Traefik instead of NPM)
      # - "traefik.enable=true"
      # - "traefik.http.routers.herhoffer.rule=Host(`herhoffer.net`)"
      # - "traefik.http.services.herhoffer.loadbalancer.server.port=80"

    environment:
      - TZ=Europe/Berlin

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  nginx-proxy-manager:
    external: true
